kind = "mobile"
previewPath = "/"
title = "NEET JEE Prep"
version = "1.0.0"
id = "artifacts/neet-jee-prep"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22160

[services.development]
run = "pnpm --filter @workspace/neet-jee-prep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neet-jee-prep", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/neet-jee-prep", "run", "serve" ]

[services.env]
PORT = "22160"
BASE_PATH = "/"
